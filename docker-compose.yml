services:
  deepstream:
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    network_mode: host
    volumes:
      - ./output:/app/output
      - ./models:/app/models
      - ./configs:/app/configs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: >
      python3 /app/deepstream/pipeline.py
        --sources-file /app/configs/sources.local.json
        --pose-config /app/deepstream/config_infer_yolo26m_pose.yml
        --output-dir /app/output
        --conf-threshold 0.25
        --stream-port 5555
        --segment-duration 60
